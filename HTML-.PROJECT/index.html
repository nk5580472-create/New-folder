<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY LOVE STORY</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            overflow: hidden;
            font-family: 'Great Vibes', cursive;
            text-align: center;
        }

        /* Romantic Name */
        h1 {
            font-size: 70px;
            color: white;
            text-shadow: 0 0 20px red;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #fff;
            }

            to {
                text-shadow: 0 0 30px #ff1a75;
            }
        }

        /* Photo Style */
        .love-photo {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 5px solid white;
            margin-top: 20px;
            box-shadow: 0 0 30px red;
            animation: zoom 3s infinite alternate;
        }

        @keyframes zoom {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }

        /* Button */
        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background-color: #ff1a75;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
        }

        /* Surprise Message */
        #message {
            font-size: 28px;
            color: white;
            margin-top: 20px;
            display: none;
        }

        /* Floating Hearts */
        .heart {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            color: red;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <h1>Aman ❤️ Aman</h1>

    <img src="./me.jpeg" class="love-photo">

    <button onclick="showLove()">Click for Surprise 💌</button>

    <p id="message">You are my forever & always 💖</p>

    <audio id="bgMusic" autoplay loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <button onclick="toggleMusic()">Play / Pause Song 🎵</button>

    <script>
        function showLove() {
            document.getElementById("message").style.display = "block";
        }

        /* Floating hearts */
        setInterval(() => {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 20 + "px";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }, 500);

        function toggleMusic() {
            var music = document.getElementById("bgMusic");
            if (music.paused) {
                music.play();
            } else {
                music.pause();
            }
        }
    </script>

</body>

</html>
